[build]
# This assumes that the Zola site is in a docs folder. If it isn't, you don't need
# to have a `base` variable but you do need the `publish` and `command` variables.
base    = "."
publish = "public"
command = "zola build"

[build.environment]
# Set the version name that you want to use and Netlify will automatically use it.
ZOLA_VERSION = "0.22.1"

# The magic for deploying previews of branches.
# We need to override the base url with whatever url Netlify assigns to our
# preview site.  We do this using the Netlify environment variable
# `$DEPLOY_PRIME_URL`.

# Non-production builds (PR previews and branch deploys) render the onsite-only
# pages so we can eyeball them. Flipping `onsite = true` renders the full content
# with (onsite) placeholders for the values the onsite build would fill in;
# production ([build] above) stays gated and shows the "only available onsite"
# stub.
[context.deploy-preview]
command = "sed -i 's/^onsite = false/onsite = true/' config.toml && zola build --base-url $DEPLOY_PRIME_URL"

[context.branch-deploy]
command = "sed -i 's/^onsite = false/onsite = true/' config.toml && zola build --base-url $DEPLOY_PRIME_URL"
