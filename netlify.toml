[build]
# This assumes that the Zola site is in a docs folder. If it isn't, you don't need
# to have a `base` variable but you do need the `publish` and `command` variables.
base    = "."
publish = "public"
# Production is the public nix.vegas site: force onsite = false so the
# onsite-only pages show the "only available onsite" stub. (config.toml defaults
# onsite = true so previews and local builds render them.)
command = "sed -i 's/^onsite = true/onsite = false/' config.toml && zola build"

[build.environment]
# Set the version name that you want to use and Netlify will automatically use it.
ZOLA_VERSION = "0.22.1"

# The magic for deploying previews of branches.
# We need to override the base url with whatever url Netlify assigns to our
# preview site.  We do this using the Netlify environment variable
# `$DEPLOY_PRIME_URL`.

# PR previews and branch deploys render the onsite-only pages (with
# format-matching placeholders) so we can eyeball them. They just take the
# config.toml default (onsite = true); only the base URL is overridden.
[context.deploy-preview]
command = "zola build --base-url $DEPLOY_PRIME_URL"

[context.branch-deploy]
command = "zola build --base-url $DEPLOY_PRIME_URL"
