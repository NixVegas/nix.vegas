{% if config.extra.onsite %}
<div class="hero-wrapper rgb onsite">
{% else %}
<div class="hero-wrapper rgb">
{% endif %}
  <style>
    .hero-wrapper {
      background: url('{{ year_section.extra.hero_img | safe }}') no-repeat center center;
      background-size: fill;
      background-color: #000;
    }
    {% if year_section.extra.hero_glitch_imgs | length > 0 %}
    @keyframes img-glitch {
      0%, 19.9%, 24.5%, 34.9%, 37%, 49.9%, 54%, 74.9%, 79.5%, 89.9%, 95%, 100% {
        background: url('{{ year_section.extra.hero_img | safe }}') no-repeat center center;
        background-size: fill;
        background-color: #000;
      }
      {% if year_section.extra.hero_glitch_imgs | length > 1 %}
      20% {
        background: url('{{ year_section.extra.hero_glitch_imgs | nth(n=0) | safe }}') no-repeat center center;
        background-size: fill;
        background-color: #000;
      }
      {% endif %}
      {% if year_section.extra.hero_glitch_imgs | length > 2 %}
      35% {
        background: url('{{ year_section.extra.hero_glitch_imgs | nth(n=1) | safe }}') no-repeat center center;
        background-size: fill;
        background-color: #000;
      }
      {% endif %}
      {% if year_section.extra.hero_glitch_imgs | length > 3 %}
      50% {
        background: url('{{ year_section.extra.hero_glitch_imgs | nth(n=2) | safe }}') no-repeat center center;
        background-size: fill;
        background-color: #000;
      }
      {% endif %}
      {% if year_section.extra.hero_glitch_imgs | length > 4 %}
      75% {
        background: url('{{ year_section.extra.hero_glitch_imgs | nth(n=3) | safe }}') no-repeat center center;
        background-size: fill;
        background-color: #000;
      }
      {% endif %}
      {% if year_section.extra.hero_glitch_imgs | length > 5 %}
      90% {
        background: url('{{ year_section.extra.hero_glitch_imgs | nth(n=4) | safe }}') no-repeat center center;
        background-size: fill;
        background-color: #000;
      }
      {% endif %}
    }
    {% endif %}
  </style>
  <div class="container">
    {% if year_dir %}
      {% set hero_path = year_dir ~ "/hero.md" %}
    {% else %}
      {% set hero_path = "hero.md" %}
    {% endif %}
    {% set hero = get_page(path=hero_path) %}
    {{ hero.content | safe }}
    {% include 'components/social-bar.html' %}
  </div>
</div>
