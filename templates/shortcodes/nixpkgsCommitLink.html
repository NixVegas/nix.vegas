{%- if config.extra.nixpkgs_rev -%}
<a href="https://github.com/NixOS/nixpkgs/commit/{{ config.extra.nixpkgs_rev }}">
  {%- if text -%}
    {{text}}
  {%- else -%}
    {{config.extra.nixpkgs_rev}}
  {%- endif -%}
</a>
{%- else -%}
  {%- if text -%}{{text}}{%- else -%}(onsite){%- endif -%}
{%- endif -%}
