title = "Nix Vegas"
description = "A DEF CON Community for contributors and users of Nix and NixOS"
base_url = "https://nix.vegas/"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

[markdown.highlighting]
style = "inline"
theme = "github-dark"

[extra]
og_preview_img = "/img/2026/favicon.png"
twitter_site = "@nixvegas"
twitter_user = "@nixvegas"
masto_user = "@nixvegas@defcon.social"
timezone = "America/Los_Angeles"
current_year = "2026"
cfp_year = "2026"

# Onsite/kiosk-build config slots. `onsite` is the single source of truth for
# whether the onsite-only pages render; templates gate on it. It DEFAULTS TO
# true so local builds and Netlify deploy previews show the onsite pages (with
# format-matching placeholders for the empty values below). The public builds
# turn it back off explicitly: the offsite Nix derivation
# (pkgs/nix-vegas-site/default.nix) and the Netlify production build. The onsite
# Nix derivation (onsite.nix) keeps it true and fills the values from the
# onboarding artifacts.
onsite = true
nixos_version = ""
nixpkgs_rev = ""
isos = []
vmas = []
channel = ""
manual = ""
search = ""
