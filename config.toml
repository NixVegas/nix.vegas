title = "Nix Vegas"
description = "A DEF CON Community for contributors and users of Nix and NixOS"
base_url = "https://nix.vegas/"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

[markdown.highlighting]
style = "inline"
theme = "github-dark"

[extra]
og_preview_img = "/img/2026/favicon.png"
twitter_site = "@nixvegas"
twitter_user = "@nixvegas"
masto_user = "@nixvegas@defcon.social"
timezone = "America/Los_Angeles"
current_year = "2026"
cfp_year = "2026"

# Onsite/kiosk-build config slots. The public build leaves these at their empty
# defaults (so onsite.html shows the "only available onsite" stub and the
# shortcodes render "(onsite)" placeholders); the onsite Nix derivation
# (pkgs/nix-vegas-site/onsite.nix) sets `onsite = true` and fills the rest from
# the onboarding artifacts. `onsite` is the single source of truth for whether
# we are the in-venue build; templates gate on it rather than on any one value.
onsite = false
nixos_version = ""
nixpkgs_rev = ""
isos = []
vmas = []
channel = ""
manual = ""
search = ""
