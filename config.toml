title = "Nix Vegas"
description = "A DEF CON Community for contributors and users of Nix and NixOS"
base_url = "https://nix.vegas/"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true

[extra]
og_preview_img = "/img/favicon.png"
twitter_site = "@nixvegas"
twitter_user = "@nixvegas"
masto_user = "@nixvegas@defcon.social"
timezone = "America/Los_Angeles"
current_year = "2026"
cfp_year = "2026"

# Onsite/kiosk-build config slots. The site is no longer built in two modes
# (the onsite Nix derivation was dropped), but the shortcodes in
# templates/shortcodes/ still read these — leave the empty defaults so the
# 2025 archive's /2025/onsite page renders without template errors.
nixos_version = ""
nixpkgs_rev = ""
isos = []
vmas = []
channel = ""
manual = ""
search = ""
