title = "Nix Vegas"
description = "A DEF CON Community for contributors and users of Nix and NixOS"
base_url = "https://nix.vegas/"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true

[extra]
og_preview_img = "/img/nix-vegas-thumb.png"
twitter_site = "@nixvegas"
twitter_user = "@nixvegas"
masto_user = "@nixvegas@defcon.social"
timezone = "America/Los_Angeles"
cfp_year = "2026"

# Set to true if we are building the onsite version.
onsite = false

# Configuration for onsite resources.
nixos_version = ""
nixpkgs_rev = ""
isos = []
vmas = []
channel = ""
manual = ""
search = ""
